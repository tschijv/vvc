<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#1a6ca8"/>

  <!-- Two stacked catalog pages -->
  <!-- Back page -->
  <rect x="90" y="70" width="300" height="370" rx="20" fill="#ffffff" opacity="0.35" transform="rotate(4 240 255)"/>
  <!-- Front page -->
  <rect x="110" y="80" width="300" height="370" rx="20" fill="#ffffff"/>

  <!-- Catalog lines on front page -->
  <!-- Title bar -->
  <rect x="150" y="130" width="160" height="18" rx="9" fill="#1a6ca8"/>

  <!-- List items with orange bullets -->
  <circle cx="160" cy="190" r="10" fill="#e35b10"/>
  <rect x="185" y="183" width="185" height="14" rx="7" fill="#d1d5db"/>

  <circle cx="160" cy="230" r="10" fill="#e35b10"/>
  <rect x="185" y="223" width="160" height="14" rx="7" fill="#d1d5db"/>

  <circle cx="160" cy="270" r="10" fill="#e35b10"/>
  <rect x="185" y="263" width="175" height="14" rx="7" fill="#d1d5db"/>

  <circle cx="160" cy="310" r="10" fill="#e35b10"/>
  <rect x="185" y="303" width="145" height="14" rx="7" fill="#d1d5db"/>

  <circle cx="160" cy="350" r="10" fill="#e35b10"/>
  <rect x="185" y="343" width="170" height="14" rx="7" fill="#d1d5db"/>

  <!-- Orange magnifying glass (bottom-right) -->
  <circle cx="385" cy="385" r="55" stroke="#e35b10" stroke-width="22" fill="none"/>
  <line x1="425" y1="425" x2="465" y2="465" stroke="#e35b10" stroke-width="22" stroke-linecap="round"/>
</svg>
