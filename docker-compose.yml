version: "3.9"

services:
  # PostgreSQL database (lokale ontwikkeling)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vvc
      POSTGRES_USER: vvc
      POSTGRES_PASSWORD: vvc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vvc"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Applicatie
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vvc:vvc@db:5432/vvc
      AUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
